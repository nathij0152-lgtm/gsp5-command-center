<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTWC GSP5 Command Center</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @keyframes nod-head { 0%, 100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(18px) rotate(3deg); } }
        .animate-nod-heavy { animation: nod-head 4s ease-in-out infinite; transform-origin: center bottom; }
        .clock-glow { text-shadow: 0 0 30px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ดึงความสามารถจาก Library ออกมาใช้งาน (แทนการ import)
        const { useState, useEffect, useMemo, useCallback, useRef } = React;
        const { 
            PieChart, Pie, Cell, ResponsiveContainer 
        } = Recharts;
        const { 
            Search, LogOut, QrCode, ClipboardList, Clock, ShieldCheck, 
            History, Plus, Trash2, Download, Database, CheckCheck, 
            RotateCcw, User, UserCheck, Archive, X, ImageIcon, 
            Upload, AlertTriangle, CheckCircle2, Loader2, PartyPopper 
        } = LucideReact;

        // --- Firebase Setup (คุณนทีต้องเอา Config จริงมาใส่ตรงนี้นะครับ) ---
        // ปกติจะได้มาจากหน้า Console ของ Firebase
        const firebaseConfig = {
  apiKey: "AIzaSyA5fjWP11gf8a7E7_o00iy7Gp6HiZg2aHQ",
  authDomain: "ptw-command.firebaseapp.com",
  projectId: "ptw-command",
  storageBucket: "ptw-command.firebasestorage.app",
  messagingSenderId: "1069631737436",
  appId: "1:1069631737436:web:88aee2d5cf5e2a0199e099",
  measurementId: "G-DXDXMFTG8K"
};

        // เริ่มต้น Firebase แบบเก่า (Compat) เพื่อให้รันใน Browser ง่ายๆ
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'ptw-command-v7-stable';

        // --- UTILITIES ---
        const sanitizeId = (id) => String(id || "").replace(/[^a-zA-Z0-9]/g, '_').trim();
        const formatDate = (date) => {
            if (!date) return '';
            const d = date.seconds ? new Date(date.seconds * 1000) : new Date(date);
            return new Intl.DateTimeFormat('th-TH', {
                day: 'numeric', month: 'short', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            }).format(d);
        };
        const getTimeColor = (date) => 'text-blue-500';
        const getHealthColor = (percent) => {
            if (percent < 50) return { main: '#ef4444', glow: 'rgba(239,68,68,0.7)', bg: 'rgba(239,68,68,0.15)' };
            if (percent < 80) return { main: '#f97316', glow: 'rgba(249,115,22,0.7)', bg: 'rgba(249,115,22,0.15)' };
            return { main: '#10b981', glow: 'rgba(16,185,129,0.7)', bg: 'rgba(16,185,129,0.15)' };
        };

        const getPermitTypeStyle = (type, isMobile = false) => {
            const baseClass = "bg-blue-600 rounded-lg px-3 py-1 text-[11px] text-white";
            return baseClass;
        };

        // --- COMPONENT: LOGO ---
        const PTWCBranding = ({ mode = "desktop", scale = 1, layout = "vertical" }) => (
            <div className={`flex ${layout === "horizontal" ? 'flex-row' : 'flex-col'} items-center gap-4`} style={{ transform: `scale(${scale})` }}>
                <div className="w-12 h-12 bg-blue-500 rounded-full flex items-center justify-center font-black text-white">GSP5</div>
                <div className="text-white font-black text-xl">PTW GSP5</div>
            </div>
        );

        const NongNgungMascot = () => (
            <div className="text-white flex flex-col items-center gap-4">
                <div className="text-6xl animate-bounce">😴</div>
                <p>กำลังโหลดข้อมูลพ่วงง่วง...</p>
            </div>
        );

        // --- MAIN APP ---
        function App() {
            const [operatorName, setOperatorName] = useState(() => localStorage.getItem('wp_user') || '');
            const [nameInput, setNameInput] = useState('');
            const [permits, setPermits] = useState([]);
            const [actions, setActions] = useState({});
            const [currentTab, setCurrentTab] = useState('dashboard');
            const [currentTime, setCurrentTime] = useState(new Date());

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            if (!operatorName) {
                return (
                    <div className="min-h-screen bg-slate-950 flex items-center justify-center p-6 text-white">
                        <div className="text-center space-y-6">
                            <PTWCBranding scale={1.5} />
                            <input 
                                className="bg-slate-800 p-4 rounded-xl w-full text-center"
                                placeholder="ใส่ชื่อผู้ตรวจสอบ"
                                value={nameInput}
                                onChange={e => setNameInput(e.target.value)}
                            />
                            <button 
                                className="bg-blue-600 w-full p-4 rounded-xl font-bold"
                                onClick={() => { setOperatorName(nameInput); localStorage.setItem('wp_user', nameInput); }}
                            >เข้าสู่ระบบ</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-950 text-white p-6">
                    <header className="flex justify-between items-center mb-10">
                        <PTWCBranding layout="horizontal" scale={0.8} />
                        <div className="text-right">
                            <div className="text-blue-400 font-bold">{operatorName}</div>
                            <div className="text-sm opacity-50">{currentTime.toLocaleTimeString()}</div>
                        </div>
                    </header>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                        <div className="bg-slate-900 p-8 rounded-3xl border border-white/5 text-center">
                            <p className="text-xs opacity-50 uppercase tracking-widest">Total Permits</p>
                            <h2 className="text-5xl font-black">{permits.length}</h2>
                        </div>
                        <div className="bg-slate-900 p-8 rounded-3xl border border-white/5 text-center">
                            <p className="text-xs opacity-50 uppercase tracking-widest">Verified</p>
                            <h2 className="text-5xl font-black text-emerald-400">{Object.keys(actions).length}</h2>
                        </div>
                        <div className="bg-slate-900 p-8 rounded-3xl border border-white/5 text-center">
                            <p className="text-xs opacity-50 uppercase tracking-widest">Safety Health</p>
                            <h2 className="text-5xl font-black text-blue-400">100%</h2>
                        </div>
                    </div>

                    <div className="bg-slate-900 rounded-3xl border border-white/5 overflow-hidden">
                         <div className="p-6 border-b border-white/5 bg-white/5 font-bold">ใบอนุญาตที่กำลังดำเนินการ</div>
                         <div className="p-20 text-center opacity-20">ไม่มีข้อมูลใบงานในขณะนี้</div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
