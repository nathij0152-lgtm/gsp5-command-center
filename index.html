<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTWC GSP5 Command Center (v8.21.0)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        @keyframes nod-head { 0%, 100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(18px) rotate(3deg); } }
        .animate-nod-heavy { animation: nod-head 4s ease-in-out infinite; transform-origin: center bottom; }
        .clock-glow { text-shadow: 0 0 30px rgba(59, 130, 246, 0.5); }
        body { background-color: #020617; font-family: sans-serif; }
    </style>
</head>
<body class="text-white no-select">
    <div id="root"></div>

    <script type="text/babel">
        // เตรียมเครื่องมือ (ดึงมาใช้งานแทนการ import สีชมพู)
        const { useState, useEffect, useMemo, useCallback, useRef } = React;
        const { ResponsiveContainer, PieChart, Pie, Cell } = Recharts;
        const { 
            Search, LogOut, QrCode, ClipboardList, Clock, ShieldCheck, 
            History, Plus, Trash2, Download, Database, CheckCheck, 
            RotateCcw, User, UserCheck, Archive, X, ImageIcon, 
            Upload, AlertTriangle, CheckCircle2, Loader2, PartyPopper, Camera, Images
        } = LucideReact;

        // --- 1. ใส่ Firebase Config ของคุณนทีให้เรียบร้อยแล้วครับ ---
        const firebaseConfig = {
            apiKey: "AIzaSyA5fjWP11gf8a7E7_o00iy7Gp6HiZg2aHQ",
            authDomain: "ptw-command.firebaseapp.com",
            projectId: "ptw-command",
            storageBucket: "ptw-command.firebasestorage.app",
            messagingSenderId: "1069631737436",
            appId: "1:1069631737436:web:88aee2d5cf5e2a0199e099",
            measurementId: "G-DXDXMFTG8K"
        };

        // เริ่มต้น Firebase
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = 'ptw-command-v7-stable';

        // --- 2. ตัวแอปหลัก (App Function) ฉบับสมบูรณ์ ---
        function App() {
            const [operatorName, setOperatorName] = useState(() => localStorage.getItem('wp_user') || '');
            const [nameInput, setNameInput] = useState('');
            const [permits, setPermits] = useState([]);
            const [actions, setActions] = useState({});
            const [currentTime, setCurrentTime] = useState(new Date());

            useEffect(() => {
                const clock = setInterval(() => setCurrentTime(new Date()), 1000);
                
                // เชื่อมต่อฐานข้อมูลใบงานจริง
                const unsubPermits = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('permits')
                    .onSnapshot(s => setPermits(s.docs.map(d => d.data())));
                
                // เชื่อมต่อข้อมูลการ Verify
                const unsubActions = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('actions')
                    .onSnapshot(s => {
                        const m = {};
                        s.docs.forEach(d => { m[d.data().fullId] = d.data(); });
                        setActions(m);
                    });

                return () => { clearInterval(clock); unsubPermits(); unsubActions(); };
            }, []);

            // หน้า Login
            if (!operatorName) return (
                <div className="min-h-screen flex flex-col items-center justify-center p-10 bg-[#020617]">
                    <div className="w-20 h-20 bg-blue-600 rounded-3xl mb-8 flex items-center justify-center shadow-[0_0_50px_rgba(37,99,235,0.4)] animate-pulse">
                        <ShieldCheck size={48} className="text-white" />
                    </div>
                    <h1 className="text-5xl font-black text-white mb-2 tracking-tighter">PTW GSP5</h1>
                    <p className="text-blue-500 font-bold uppercase tracking-[0.4em] text-xs mb-12">Command Center</p>
                    
                    <div className="w-full max-w-sm space-y-4">
                        <input 
                            className="w-full bg-slate-900 border border-white/10 p-6 rounded-3xl text-center text-xl text-white outline-none focus:ring-2 ring-blue-500 transition-all" 
                            placeholder="ระบุชื่อผู้ตรวจสอบ..." 
                            value={nameInput} 
                            onChange={e => setNameInput(e.target.value)} 
                        />
                        <button 
                            className="w-full bg-blue-600 text-white py-6 rounded-3xl text-xl font-bold active:scale-95 transition-all shadow-xl" 
                            onClick={() => { if(nameInput.trim()){ setOperatorName(nameInput.trim()); localStorage.setItem('wp_user', nameInput.trim()); } }}
                        >เข้าสู่ระบบ</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-[#020617] p-6 text-white">
                    <header className="flex justify-between items-center mb-10 border-b border-white/5 pb-6">
                        <div className="flex items-center gap-4">
                            <div className="p-2 bg-blue-600 rounded-lg"><ShieldCheck size={20}/></div>
                            <h1 className="text-xl font-black tracking-tighter">PTWC GSP5</h1>
                        </div>
                        <div className="text-right">
                            <p className="text-blue-400 font-black text-lg">{operatorName}</p>
                            <p className="text-[10px] opacity-50 font-mono tracking-widest uppercase">{currentTime.toLocaleTimeString('th-TH')}</p>
                        </div>
                    </header>

                    <main className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 text-center">
                        <div className="bg-slate-900/50 p-8 rounded-[2.5rem] border border-white/5 shadow-xl">
                            <p className="text-[10px] font-black opacity-30 uppercase tracking-widest mb-2">Total Permits</p>
                            <p className="text-6xl font-black tabular-nums">{permits.length}</p>
                        </div>
                        <div className="bg-slate-900/50 p-8 rounded-[2.5rem] border border-white/5 shadow-xl">
                            <p className="text-[10px] font-black opacity-30 uppercase tracking-widest mb-2 text-emerald-400">Verified</p>
                            <p className="text-6xl font-black text-emerald-400 tabular-nums">{Object.keys(actions).length}</p>
                        </div>
                        <div className="bg-slate-900/50 p-8 rounded-[2.5rem] border border-white/5 shadow-xl">
                            <p className="text-[10px] font-black opacity-30 uppercase tracking-widest mb-2 text-blue-400">System Status</p>
                            <p className="text-4xl font-black text-blue-500 pt-3 italic">READY</p>
                        </div>
                    </main>

                    <div className="bg-slate-900/80 rounded-[3.5rem] border border-white/10 min-h-[400px] shadow-2xl overflow-hidden">
                        <div className="p-8 border-b border-white/5 bg-white/5 flex justify-between items-center">
                            <span className="font-black uppercase tracking-widest text-xs opacity-50">Active Worksite Monitor</span>
                            <div className="flex gap-2">
                                <button className="p-3 bg-white/5 rounded-xl"><Camera size={18}/></button>
                                <button className="p-3 bg-white/5 rounded-xl"><Images size={18}/></button>
                            </div>
                        </div>

                        {permits.length === 0 ? (
                            <div className="flex flex-col items-center justify-center p-32 opacity-20">
                                <Loader2 className="animate-spin mb-4" size={48} />
                                <p className="font-black uppercase tracking-[0.3em] italic">Awaiting GSP5 Data...</p>
                            </div>
                        ) : (
                            <div className="p-6 space-y-4">
                                {
