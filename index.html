<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTWC GSP5 Command Center</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        
// Firebase Imports
import { initializeApp } from 'firebase/app';
import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'firebase/auth';
import { initializeFirestore, collection, doc, setDoc, onSnapshot, writeBatch, serverTimestamp, getDocs, addDoc, query, deleteDoc, orderBy } from 'firebase/firestore';

// --- Configuration (V.8.21.0 MASTER GUARD - 1,000,000% LOCKED) ---
const APP_VERSION = "v8.21.0-MASTER-GUARD"; 
const apiKey = ""; 

const firebaseConfig = JSON.parse(__firebase_config);
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = initializeFirestore(app, { experimentalForceLongPolling: true });
const appId = typeof __app_id !== 'undefined' ? __app_id : 'ptw-command-v7-stable';

// --- UTILITIES ---
const sanitizeId = (id) => String(id || "").replace(/[^a-zA-Z0-9]/g, '_').trim();

const formatDate = (date) => {
  if (!date) return '';
  try {
    const d = date?.seconds ? new Date(date.seconds * 1000) : new Date(date);
    if (isNaN(d.getTime())) return '';
    return new Intl.DateTimeFormat('th-TH', {
      day: 'numeric', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    }).format(d);
  } catch (e) { return ''; }
};

const getTimeColor = (date) => {
    if (!date) return 'text-blue-500';
    const d = date?.seconds ? new Date(date.seconds * 1000) : new Date(date);
    const h = d.getHours();
    const isOrangeTime = (h >= 8 && h < 13) || (h >= 20 || h === 0);
    return isOrangeTime ? 'text-orange-500' : 'text-blue-500';
};

const getHealthColor = (percent) => {
  if (percent < 50) return { main: '#ef4444', glow: 'rgba(239,68,68,0.7)', bg: 'rgba(239,68,68,0.15)' };
  if (percent < 80) return { main: '#f97316', glow: 'rgba(249,115,22,0.7)', bg: 'rgba(249,115,22,0.15)' };
  return { main: '#10b981', glow: 'rgba(16,185,129,0.7)', bg: 'rgba(16,185,129,0.15)' };
};

const getPermitTypeStyle = (type, isMobile = false) => {
  const t = String(type || "").toLowerCase();
  const baseClass = `bg-opacity-55 backdrop-blur-md border border-white/40 text-white shadow-sm font-black ${isMobile ? 'text-[9px] py-0.5 px-2 rounded-md' : 'rounded-lg px-3 py-1 text-[11px]'}`;
  if (t.includes("class i") || t.includes("open flame") || t.includes("ร้อน") || t.includes("สัมผัสเปลวไฟ") || t.includes("ประกายไฟ")) {
    if (t.includes("non open flame") || t.includes("ไม่มีประกายไฟ")) return `bg-orange-500 ${baseClass}`;
    return `bg-red-600 ${baseClass}`;
  }
  if (t.includes("class ii") || t.includes("non open flame") || t.includes("ไม่มีประกายไฟ")) return `bg-orange-500 ${baseClass}`;
  if (t.includes("confined space") || t.includes("อับอากาศ")) return `bg-emerald-600 ${baseClass}`;
  if (t.includes("cold work") || t.includes("ธรรมดา") || t.includes("ทั่วไป")) return `bg-blue-600 ${baseClass}`;
  return `bg-slate-500 ${baseClass}`;
};

// --- LOGO BRANDING ---
const PTWCBranding = ({ mode = "desktop", scale = 1, layout = "vertical" }) => {
  const isHorizontal = layout === "horizontal";
  const iconSize = mode === "mobile" ? "w-10 h-10" : "w-14 h-14";
  return (
    <div className={`flex ${isHorizontal ? 'flex-row items-center gap-4' : 'flex-col items-center gap-6'} select-none`} style={{ transform: `scale(${scale})` }}>
      <div className={`${iconSize} relative flex-shrink-0 flex items-center justify-center`}>
        <div className="absolute inset-0 bg-blue-500/30 blur-2xl rounded-full"></div>
        <svg viewBox="0 0 100 100" className="w-full h-full relative z-10 drop-shadow-lg">
          <defs><linearGradient id="logoGradV821" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style={{ stopColor: '#3b82f6' }} /><stop offset="100%" style={{ stopColor: '#10b981' }} /></linearGradient></defs>
          <path d="M50 5 L85 22 L85 55 C85 75 50 92 50 92 C50 92 15 75 15 55 L15 22 Z" fill="url(#logoGradV821)" />
          <path d="M35 50 L45 60 L65 40" fill="none" stroke="white" strokeWidth="10" strokeLinecap="round" strokeLinejoin="round" />
        </svg>
      </div>
      <div className={`${isHorizontal ? 'text-left border-l-2 border-white/10 pl-4' : 'text-center'}`}>
        <h1 className={`${isHorizontal ? 'text-2xl' : 'text-5xl md:text-6xl'} font-black tracking-tighter text-white leading-none whitespace-nowrap`}>PTW GSP5</h1>
        <p className={`${isHorizontal ? 'text-[8px]' : 'text-[10px] md:text-[12px] mt-3'} font-black uppercase tracking-[0.5em] text-white/40 leading-none`}>Command Center</p>
      </div>
    </div>
  );
};

const NongNgungMascot = () => (
  <div className="flex flex-col items-center gap-6 animate-in fade-in zoom-in duration-700">
    <div className="relative w-56 h-56">
        <div className="absolute top-0 right-0 z-20 pointer-events-none">
            <span className="text-4xl font-black text-blue-300 absolute -top-8 -right-4 animate-zzz-1">Z</span>
            <span className="text-2xl font-black text-blue-400 absolute -top-14 -right-12 animate-zzz-2">z</span>
            <span className="text-lg font-black text-blue-500 absolute -top-18 -right-18 animate-zzz-3">z</span>
        </div>
      <svg viewBox="0 0 200 200" className="w-full h-full drop-shadow-[0_20px_40px_rgba(0,0,0,0.5)]">
        <defs><radialGradient id="bodyGradV821" cx="50%" cy="40%" r="50%"><stop offset="0%" stopColor="#93c5fd" /><stop offset="70%" stopColor="#3b82f6" /><stop offset="100%" stopColor="#1e40af" /></radialGradient></defs>
        <g className="animate-nod-heavy origin-bottom">
          <circle cx="100" cy="110" r="75" fill="url(#bodyGradV821)" stroke="white" strokeWidth="1" opacity="0.9" />
          <g className="stroke-white stroke-[6] fill-none stroke-linecap-round opacity-80"><path d="M60 105 Q80 95 100 105" /><path d="M100 105 Q120 95 140 105" /></g>
          <path d="M90 135 Q100 145 110 135" stroke="white" strokeWidth="4" fill="none" strokeLinecap="round" opacity="0.6" />
        </g>
      </svg>
      <div className="absolute inset-0 border-[12px] border-blue-400/10 rounded-full animate-ping-slow"></div>
    </div>
    <div className="text-center space-y-3">
      <div className="flex items-center justify-center gap-3"><Loader2 className="animate-spin text-blue-400" size={24} /><h2 className="text-2xl font-black text-slate-500 tracking-widest uppercase italic">AI Processing...</h2></div>
      <p className="text-slate-400/80 font-bold text-lg animate-pulse">กำลังจัดระเบียบข้อมูลให้พี่อยู่นะครับ</p>
    </div>
  </div>
);

export default function App() {
  const [user, setUser] = useState(null);
  const [operatorName, setOperatorName] = useState(() => localStorage.getItem('wp_user') || '');
  const [nameInput, setNameInput] = useState('');
  const [permits, setPermits] = useState([]);
  const [actions, setActions] = useState({}); 
  const [historyData, setHistoryData] = useState([]);
  const [searchQuery, setSearchQuery] = useState('');
  const [isScanning, setIsScanning] = useState(false);
  const [isAiMode, setIsAiMode] = useState(false); 
  const [activePulses, setActivePulses] = useState([]);
  const [undoTimers, setUndoTimers] = useState({}); 
  const [expandedRows, setExpandedRows] = useState({});
  const [qrUrl, setQrUrl] = useState(() => localStorage.getItem('wp_qr_img') || '');
  const [isUploading, setIsUploading] = useState(false);
  const [currentTab, setCurrentTab] = useState('dashboard');
  const [currentTime, setCurrentTime] = useState(new Date());

  const [showResetModal, setShowResetModal] = useState(false);
  const [showQRModal, setShowQRModal] = useState(false);
  const [showHistoryModal, setShowHistoryModal] = useState(false);
  const [showAddWorkModal, setShowAddWorkModal] = useState(false);
  const [pendingAddItems, setPendingAddItems] = useState([]);
  const [confirmVerify, setConfirmVerify] = useState(null); 
  const [confirmVerifyAll, setConfirmVerifyAll] = useState(false);
  const [showSuccessToast, setShowSuccessToast] = useState(false);
  const [scanAlert, setScanAlert] = useState(null); 

  const cameraInputRef = useRef(null);
  const galleryInputRef = useRef(null);
  const qrFileRef = useRef(null);

  const getSupName = useCallback((p) => p['ชื่อผู้ควบคุมงาน'] || p['ผู้ควบคุมงาน'] || p['supervisor'] || '-', []);

  // --- Core Lifecycle ---
  useEffect(() => {
    const initAuth = async () => {
      if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
      else await signInAnonymously(auth);
    };
    initAuth();
    onAuthStateChanged(auth, setUser);
    const resizer = () => { if (window.innerWidth < 1024) setCurrentTab('mobile'); else setCurrentTab('dashboard'); };
    resizer(); window.addEventListener('resize', resizer);
    const clock = setInterval(() => setCurrentTime(new Date()), 1000);
    if (!window.XLSX) {
      const s = document.createElement("script");
      s.src = "https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js";
      document.head.appendChild(s);
    }
    return () => { window.removeEventListener('resize', resizer); clearInterval(clock); };
  }, []);

  useEffect(() => {
    if (!user) return;
    const unsubP = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'permits'), s => setPermits(s.docs.map(d => d.data())));
    const unsubA = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'actions'), s => { 
        const m = {}; const now = Date.now(); const newPulses = [];
        s.docs.forEach(d => { 
            const data = d.data(); m[data.fullId] = data; 
            if (now - new Date(data.timestamp).getTime() < 5000) newPulses.push(data.fullId);
        }); 
        setActions(m); 
        if (newPulses.length > 0) {
            setActivePulses(prev => [...new Set([...prev, ...newPulses])]);
            setTimeout(() => setActivePulses(prev => prev.filter(id => !newPulses.includes(id))), 10000);
        }
    });
    const unsubH = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'history'), s => setHistoryData(s.docs.map(d => ({id: d.id, ...d.data()}))));
    return () => { unsubP(); unsubA(); unsubH(); };
  }, [user]);

  useEffect(() => {
      const timer = setInterval(() => {
          setUndoTimers(prev => {
              const next = { ...prev };
              Object.keys(next).forEach(id => {
                  if (next[id] <= 0) delete next[id];
                  else next[id] -= 1;
              });
              return next;
          });
      }, 1000);
      return () => clearInterval(timer);
  }, []);

  // 2. [LOCKED] Standardized Export Function (Main & History)
  const handleExportExcel = (dataList, filename = "PTW_Audit", actionMap = actions) => {
    if (!window.XLSX) return;
    const formatted = dataList.map(p => {
      const act = actionMap[p.fullId];
      return {
          "เลขใบอนุญาต": p.fullId,
          "ชื่อผู้ตรวจสอบ": act?.operator || '-',
          "เวลาตรวจสอบ": act ? formatDate(act.timestamp) : 'รอดำเนินการ',
          "รายละเอียดงาน": p['รายละเอียดงาน'] || '-',
          "พื้นที่": p['พื้นที่'] || p['อื่น ๆ'] || '-'
      };
    });
    const ws = window.XLSX.utils.json_to_sheet(formatted);
    // Set Optimal Widths
    ws['!cols'] = [{wch: 18}, {wch: 25}, {wch: 25}, {wch: 60}, {wch: 30}];
    const wb = window.XLSX.utils.book_new();
    window.XLSX.utils.book_append_sheet(wb, ws, "AuditData");
    window.XLSX.writeFile(wb, `${filename}_${new Date().toISOString().split('T')[0]}.xlsx`);
  };

  const handleAction = async (id) => {
    if (!user || !id) return;
    try {
      await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'actions', sanitizeId(id)), {
        fullId: String(id), timestamp: new Date().toISOString(), operator: String(operatorName), serverTime: serverTimestamp()
      });
      setConfirmVerify(null);
      setUndoTimers(prev => ({ ...prev, [id]: 60 }));
      setShowSuccessToast(true); setTimeout(() => setShowSuccessToast(false), 3000);
    } catch (e) { console.error(e); }
  };

  const handleUndoAction = async (id) => {
      if (!user || !id) return;
      try {
          await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'actions', sanitizeId(id)));
          setUndoTimers(prev => { const n = {...prev}; delete n[id]; return n; });
      } catch (e) { console.error(e); }
  };

  const handleVerifyAllFiltered = async () => {
    const itemsToVerify = masterListFiltered.filter(p => !actions[p.fullId]);
    if (!user || itemsToVerify.length === 0) return;
    setIsUploading(true);
    try {
      const batch = writeBatch(db);
      const now = new Date().toISOString();
      itemsToVerify.forEach(p => {
          batch.set(doc(db, 'artifacts', appId, 'public', 'data', 'actions', sanitizeId(p.fullId)), {
            fullId: String(p.fullId), timestamp: now, operator: String(operatorName), serverTime: serverTimestamp()
          });
      });
      await batch.commit();
      const newTimers = {};
      itemsToVerify.forEach(p => newTimers[p.fullId] = 60);
      setUndoTimers(prev => ({ ...prev, ...newTimers }));
      setConfirmVerifyAll(false); setSearchQuery(""); setIsAiMode(false);
      setShowSuccessToast(true); setTimeout(() => setShowSuccessToast(false), 3000);
    } catch (e) { console.error(e); } finally { setIsUploading(false); }
  };

  // 1. [LOCKED] AI-Scan Alert Unified Handler (Camera & Gallery)
  const handleUniversalScan = async (e) => {
    const file = e.target.files[0]; if (!file) return;
    setIsScanning(true); setSearchQuery(""); setIsAiMode(false);
    try {
      const base64 = await new Promise(r => { const rd = new FileReader(); rd.onloadend = () => r(rd.result.split(',')[1]); rd.readAsDataURL(file); });
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: "Extract permit numbers (5-6 digits). Return JSON: ['12345', ...]" }, { inlineData: { mimeType: file.type, data: base64 } }] }],
          generationConfig: { responseMimeType: "application/json" }
        })
      });
      const data = await res.json();
      const rawIds = JSON.parse(data.candidates?.[0]?.content?.parts?.[0]?.text || "[]");
      if (Array.isArray(rawIds) && rawIds.length > 0) {
        setSearchQuery(rawIds.join(" ")); 
        setIsAiMode(true); 
      } else { 
          // 6. [LOCKED] Unified Manual Close Alert for Both Cases
          setScanAlert("AI ตรวจสอบไม่พบเลขที่ใบอนุญาตบนรูปภาพนี้ กรุณาถ่ายภาพให้ชัดเจนขึ้น หรือตรวจสอบว่าเป็นใบงาน PTW ที่ถูกต้องครับ (กรณีอัปโหลดจาก Gallery หรือถ่ายใหม่)"); 
      }
    } catch (err) { setScanAlert("เกิดข้อผิดพลาดในการเชื่อมต่อระบบสแกน กรุณาลองใหม่อีกครั้งครับ"); } finally { setIsScanning(false); if(e.target) e.target.value = ""; }
  };

  const masterListFiltered = useMemo(() => {
    let base = [...permits];
    if (searchQuery) {
      const kws = searchQuery.toLowerCase().trim().split(/[ ,]+/);
      base = base.filter(p => kws.some(k => String(p.fullId).toLowerCase().includes(k) || getSupName(p).toLowerCase().includes(k)));
    }
    return base.sort((a, b) => {
      const actA = actions[a.fullId]; const actB = actions[b.fullId];
      if (currentTab === 'dashboard') {
        if (actA && !actB) return -1; if (!actA && actB) return 1;
        if (actA && actB) return new Date(actB.timestamp) - new Date(actA.timestamp);
      } else {
        if (actA && !actB) return 1; if (!actA && actB) return -1;
      }
      return getSupName(a).localeCompare(getSupName(b), 'th');
    });
  }, [permits, searchQuery, actions, getSupName, currentTab]);

  const stats = useMemo(() => {
    const total = permits.length; const actioned = Object.keys(actions).length;
    return { total, actioned, pending: total - actioned, health: total > 0 ? Math.round((actioned / total) * 100) : 0 };
  }, [permits, actions]);

  const hColor = useMemo(() => getHealthColor(stats.health), [stats.health]);

  if (!operatorName) return (
    <div className="min-h-screen flex items-center justify-center p-6 bg-[#020617] relative overflow-hidden no-select">
      <div className="absolute inset-0 bg-gradient-to-br from-blue-900/10 via-transparent to-transparent pointer-events-none"></div>
      <div className={`bg-[#0f172a]/60 border border-white/10 rounded-[4rem] w-full shadow-[0_0_120px_rgba(0,0,0,0.8)] backdrop-blur-3xl flex flex-col items-center animate-in zoom-in duration-700 
        ${currentTab === 'mobile' ? 'p-12 max-w-sm' : 'p-20 max-w-4xl'}`} style={currentTab === 'dashboard' ? { transform: 'scale(0.75)' } : {}}>
        <PTWCBranding layout="vertical" scale={currentTab === 'mobile' ? 1.2 : 1.8} />
        <form onSubmit={(e) => { e.preventDefault(); if(nameInput.trim()){ setOperatorName(nameInput.trim()); localStorage.setItem('wp_user', nameInput.trim()); } }} 
          className={`w-full ${currentTab === 'mobile' ? 'mt-12 space-y-6' : 'mt-24 space-y-12'}`}>
          <div className={`bg-[#1e293b]/80 border border-white/5 shadow-inner p-8 rounded-[3rem] focus-within:ring-2 ring-blue-500/50 transition-all`}>
            <input type="text" required className="w-full bg-transparent outline-none text-white font-black text-center text-xl sm:text-5xl placeholder:text-white/10 placeholder:text-lg sm:placeholder:text-5xl" placeholder="ระบุชื่อผู้ตรวจสอบ..." value={nameInput} onChange={e => setNameInput(e.target.value)} />
          </div>
          <button className="w-full bg-[#2563eb] text-white font-black py-8 rounded-[3rem] text-2xl sm:text-4xl active:scale-95 transition-all shadow-xl hover:bg-blue-600 uppercase tracking-widest">เข้าสู่ระบบ</button>
        </form>
        <p className="text-white/10 font-black uppercase tracking-[0.8em] mt-16 text-[12px]">{APP_VERSION}</p>
      </div>
    </div>
  );

  return (
    <div className="min-h-screen bg-[#020617] text-slate-200 font-sans pb-10 bg-safety-master-hero no-select">
      
      <header className="bg-[#0f172a]/95 border-b border-white/5 sticky top-0 z-[100] px-6 h-16 flex items-center justify-between backdrop-blur-3xl shadow-2xl">
        <PTWCBranding layout="horizontal" mode={currentTab === 'mobile' ? "mobile" : "desktop"} scale={0.7} />
        <div className="flex items-center gap-6">
            {currentTab !== 'mobile' && (
                <div className="flex items-center gap-6 pr-6 border-r border-white/5 h-8">
                    <div className="flex flex-col items-end">
                        <p className="text-[10px] font-black opacity-30 uppercase tracking-widest text-white/30">Identity</p>
                        <div className="flex items-center gap-2 text-blue-400 font-black text-sm uppercase leading-none"><User size={12}/> {operatorName}</div>
                    </div>
                    <div className="flex flex-col items-end w-24">
                        <p className="text-[10px] font-black opacity-30 uppercase tracking-widest text-white/30">Time</p>
                        <p className="text-white font-mono-elegant text-lg leading-none font-black tracking-tighter clock-glow">{currentTime.toLocaleTimeString('th-TH', { hour12: false })}</p>
                    </div>
                </div>
            )}
            <div className="flex items-center gap-3">
                <button onClick={() => setShowQRModal(true)} className="p-2.5 bg-blue-600/10 text-blue-500 rounded-xl border border-blue-500/10 active:scale-90"><QrCode size={20}/></button>
                <button onClick={() => {setOperatorName(''); localStorage.removeItem('wp_user');}} className="p-2.5 opacity-20 hover:text-red-500"><LogOut size={20}/></button>
            </div>
        </div>
      </header>

      {currentTab === 'mobile' && (
          <div className="p-4 space-y-3 animate-in slide-in-from-top duration-300">
              <div className="flex items-center gap-2">
                  <button onClick={() => cameraInputRef.current?.click()} className="flex-1 bg-white/5 border border-white/10 h-12 rounded-xl flex items-center justify-center gap-2 active:scale-95"><Camera size={18} className="text-blue-400"/><span className="text-[11px] font-black uppercase">Camera</span><input ref={cameraInputRef} type="file" accept="image/*" capture="environment" className="hidden" onChange={handleUniversalScan} /></button>
                  <button onClick={() => galleryInputRef.current?.click()} className="flex-1 bg-white/5 border border-white/10 h-12 rounded-xl flex items-center justify-center gap-2 active:scale-95"><Images size={18} className="text-blue-400"/><span className="text-[11px] font-black uppercase">Gallery</span><input ref={galleryInputRef} type="file" accept="image/*" className="hidden" onChange={handleUniversalScan} /></button>
                  {isAiMode && masterListFiltered.some(p => !actions[p.fullId]) && (
                      <button onClick={() => setConfirmVerifyAll(true)} className="bg-emerald-600 text-white px-5 rounded-xl flex items-center gap-2 shadow-lg animate-in zoom-in h-12">
                        <CheckCircle2 size={18}/>
                        <span className="text-[11px] font-black uppercase">Verify all ({masterListFiltered.filter(p => !actions[p.fullId]).length})</span>
                      </button>
                  )}
              </div>
              <div className="relative h-12">
                  <Search className="absolute left-4 top-1/2 -translate-y-1/2 text-white/30" size={20}/>
                  <input type="text" inputMode="numeric" placeholder="Search Permit IDs..." className="w-full h-full bg-[#1e293b]/80 border border-white/10 rounded-2xl pl-12 pr-4 text-lg font-bold outline-none placeholder:text-white/20" value={searchQuery} onChange={e => {setSearchQuery(e.target.value); if(isAiMode) setIsAiMode(false);}} />
              </div>
          </div>
      )}

      <main className="p-6 max-w-[1900px] mx-auto space-y-10 relative z-10 animate-in fade-in duration-700">
        
        {currentTab === 'dashboard' ? (
          <>
            <section className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                <div className="bg-[#0f172a]/80 border border-white/10 lg:col-span-4 p-12 rounded-[5rem] flex flex-col items-center justify-center relative shadow-massive group overflow-hidden">
