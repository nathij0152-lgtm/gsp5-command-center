<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTWC GSP5 Command Center</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        @keyframes nod-head { 0%, 100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(18px) rotate(3deg); } }
        .animate-nod-heavy { animation: nod-head 4s ease-in-out infinite; transform-origin: center bottom; }
        .no-select { user-select: none; -webkit-user-select: none; }
        body { background-color: #020617; color: white; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // จัดการดึงเครื่องมือออกมา (แทนการใช้ import)
        const { useState, useEffect, useMemo, useCallback, useRef } = React;
        const { ResponsiveContainer, PieChart, Pie, Cell } = Recharts;
        const { 
            Search, LogOut, QrCode, ClipboardList, Clock, ShieldCheck, 
            History, Plus, Trash2, Download, Database, CheckCheck, 
            RotateCcw, User, UserCheck, Archive, X, ImageIcon, 
            Upload, AlertTriangle, CheckCircle2, Loader2, PartyPopper, Camera, Images
        } = LucideReact;

        // --- 1. [แก้ไขที่นี่] วางค่าที่ก๊อปมาจาก Firebase ของคุณนทีครับ ---
        const firebaseConfig = {

            apiKey: "AIzaSyA5fjWP11gf8a7E7_o00iy7Gp6HiZg2aHQ",

            authDomain: "ptw-command.firebaseapp.com",

            projectId: "ptw-command",

            storageBucket: "ptw-command.firebasestorage.app",

            messagingSenderId: "1069631737436",

            appId: "1:1069631737436:web:88aee2d5cf5e2a0199e099"

        };

        // เริ่มต้นระบบฐานข้อมูล
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = 'ptw-command-v7-stable';

        // --- 2. ตัวแอป PTWC GSP5 (ลบ import ออกให้หมดแล้วครับ) ---
        function App() {
            const [operatorName, setOperatorName] = useState(() => localStorage.getItem('wp_user') || '');
            const [nameInput, setNameInput] = useState('');
            const [permits, setPermits] = useState([]);
            const [currentTime, setCurrentTime] = useState(new Date());

            useEffect(() => {
                const clock = setInterval(() => setCurrentTime(new Date()), 1000);
                // ดึงข้อมูลจาก Firebase
                const unsub = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('permits')
                    .onSnapshot(s => setPermits(s.docs.map(d => d.data())));
                return () => { clearInterval(clock); unsub(); };
            }, []);

            if (!operatorName) return (
                <div className="min-h-screen flex items-center justify-center p-6">
                    <div className="text-center space-y-8 w-full max-w-sm">
                        <h1 className="text-4xl font-black text-blue-500">PTW GSP5</h1>
                        <input className="w-full bg-slate-900 border border-white/10 p-5 rounded-2xl text-center text-white" 
                               placeholder="ระบุชื่อผู้ตรวจสอบ..." value={nameInput} onChange={e => setNameInput(e.target.value)} />
                        <button className="w-full bg-blue-600 py-5 rounded-2xl font-bold" 
                                onClick={() => { if(nameInput.trim()){ setOperatorName(nameInput.trim()); localStorage.setItem('wp_user', nameInput.trim()); } }}>เข้าสู่ระบบ</button>
                    </div>
                </div>
            );

            return (
                <div className="p-6 max-w-5xl mx-auto">
                    <header className="flex justify-between items-center mb-10 border-b border-white/10 pb-6">
                        <div className="font-black text-2xl text-blue-500">PTWC GSP5</div>
                        <div className="text-right">
                            <div className="font-bold text-blue-400">{operatorName}</div>
                            <div className="text-xs opacity-50">{currentTime.toLocaleTimeString()}</div>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                        <div className="bg-slate-900 p-8 rounded-3xl border border-white/5 text-center">
                            <p className="text-[10px] opacity-30 uppercase tracking-widest mb-2">Total Permits</p>
                            <p className="text-6xl font-black">{permits.length}</p>
                        </div>
                        <div className="bg-slate-900 p-8 rounded-3xl border border-white/5 text-center">
                            <p className="text-[10px] opacity-30 uppercase tracking-widest mb-2">Verified</p>
                            <p className="text-6xl font-black text-emerald-400">0</p>
                        </div>
                        <div className="bg-slate-900 p-8 rounded-3xl border border-white/5 text-center">
                            <p className="text-[10px] opacity-30 uppercase tracking-widest mb-2">System Status</p>
                            <p className="text-4xl font-black text-blue-400 pt-3">READY</p>
                        </div>
                    </div>

                    <div className="bg-slate-900/50 rounded-[2rem] border border-white/10 overflow-hidden min-h-[300px] flex flex-col items-center justify-center">
                        {permits.length === 0 ? (
                            <div className="text-center opacity-20">
                                <Loader2 className="animate-spin mx-auto mb-4" size={48} />
                                <p className="font-black uppercase tracking-widest">Awaiting Data Connection...</p>
                            </div>
                        ) : (
                            <div className="w-full p-6 space-y-4">
                                {permits.map((p, i) => (
                                    <div key={i} className="bg-white/5 p-6 rounded-2xl flex justify-between items-center">
                                        <div className="font-bold text-xl">#{p.fullId}</div>
                                        <button className="bg-blue-600 px-6 py-2 rounded-xl text-xs font-black uppercase">Verify</button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
