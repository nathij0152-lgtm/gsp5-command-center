<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTWC GSP5 Command Center</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body class="bg-[#020617] text-white">
    <div id="root"></div>

    <script type="text/babel">
        // เตรียมเครื่องมือ (ผมจัดการเรื่อง import ให้แล้วครับ ห้ามใส่ import ซ้ำข้างล่างนี้)
        const { useState, useEffect, useMemo, useCallback, useRef } = React;
        const { ResponsiveContainer, PieChart, Pie, Cell } = Recharts;
        const { 
            Search, LogOut, QrCode, ClipboardList, Clock, ShieldCheck, 
            History, Plus, Trash2, Download, Database, CheckCheck, 
            RotateCcw, User, UserCheck, Archive, X, ImageIcon, 
            Upload, AlertTriangle, CheckCircle2, Loader2, PartyPopper, Camera, Images
        } = LucideReact;

        // --- 1. วาง Firebase Config ของคุณนทีตรงนี้ครับ ---
        const firebaseConfig = {
            apiKey: "AIzaSyA5fjWP11gf8a7E7_o00iy7Gp6HiZg2aHQ",
            authDomain: "ptw-command.firebaseapp.com",
            projectId: "ptw-command",
            storageBucket: "ptw-command.firebasestorage.app",
            messagingSenderId: "1069631737436",
            appId: "1:1069631737436:web:88aee2d5cf5e2a0199e099"
        };

        // เริ่มต้น Firebase
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = 'ptw-command-v7-stable';

        // --- 2. ไส้ในระบบ PTWC GSP5 (ฉบับแก้คำสั่ง import ออกให้แล้ว) ---
        function App() {
            const [operatorName, setOperatorName] = useState(() => localStorage.getItem('wp_user') || '');
            const [nameInput, setNameInput] = useState('');
            const [permits, setPermits] = useState([]);
            const [currentTime, setCurrentTime] = useState(new Date());

            useEffect(() => {
                const clock = setInterval(() => setCurrentTime(new Date()), 1000);
                // ดึงข้อมูลใบงานจริง
                const unsub = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('permits')
                    .onSnapshot(s => setPermits(s.docs.map(d => d.data())));
                return () => { clearInterval(clock); unsub(); };
            }, []);

            if (!operatorName) return (
                <div className="min-h-screen flex items-center justify-center bg-[#020617] p-10">
                    <div className="text-center space-y-10 w-full max-w-sm">
                        <h1 className="text-5xl font-black text-blue-500 tracking-tighter">PTW GSP5</h1>
                        <p className="text-white/30 uppercase tracking-[0.5em] text-[10px]">Command Center</p>
                        <div className="space-y-4">
                            <input className="w-full bg-slate-900 border border-white/10 p-6 rounded-3xl text-center text-xl text-white outline-none" 
                                   placeholder="ระบุชื่อผู้ตรวจสอบ..." value={nameInput} onChange={e => setNameInput(e.target.value)} />
                            <button className="w-full bg-blue-600 text-white py-6 rounded-3xl text-xl font-bold active:scale-95 transition-all shadow-lg" 
                                    onClick={() => { if(nameInput.trim()){ setOperatorName(nameInput.trim()); localStorage.setItem('wp_user', nameInput.trim()); } }}>เข้าสู่ระบบ</button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-[#020617] text-white p-6">
                    <header className="flex justify-between items-center mb-10 border-b border-white/5 pb-6">
                        <div className="flex flex-col">
                            <h1 className="text-2xl font-black text-blue-500">PTWC GSP5</h1>
                            <p className="text-[8px] font-bold opacity-30 uppercase tracking-widest">Command Center</p>
                        </div>
                        <div className="text-right">
                            <p className="text-blue-400 font-black text-lg">{operatorName}</p>
                            <p className="text-xs opacity-50 font-mono">{currentTime.toLocaleTimeString('th-TH')}</p>
                        </div>
                    </header>

                    <main className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 text-center">
                        <div className="bg-slate-900/50 p-10 rounded-[3rem] border border-white/5">
                            <p className="text-[10px] font-black opacity-30 uppercase tracking-widest mb-2">Total Permits</p>
                            <p className="text-7xl font-black tabular-nums">{permits.length}</p>
                        </div>
                        <div className="bg-slate-900/50 p-10 rounded-[3rem] border border-white/5">
                            <p className="text-[10px] font-black opacity-30 uppercase tracking-widest mb-2 text-emerald-400">Verified</p>
                            <p className="text-7xl font-black text-emerald-400 tabular-nums">0</p>
                        </div>
                        <div className="bg-slate-900/50 p-10 rounded-[3rem] border border-white/5">
                            <p className="text-[10px] font-black opacity-30 uppercase tracking-widest mb-2 text-blue-400">Status</p>
                            <p className="text-5xl font-black text-blue-500 pt-3">READY</p>
                        </div>
                    </main>

                    <div className="bg-slate-900/80 rounded-[4rem] border border-white/10 min-h-[400px] flex flex-col items-center justify-center p-10">
                        {permits.length === 0 ? (
                            <div className="flex flex-col items-center gap-4 opacity-20">
                                <Loader2 className="animate-spin" size={48} />
                                <p className="font-black uppercase tracking-widest italic">Awaiting Data Connection...</p>
                            </div>
                        ) : (
                            <div className="w-full space-y-4">
                                {permits.map((p, i) => (
                                    <div key={i} className="bg-white/5 p-6 rounded-3xl border border-white/5 flex justify-between items-center hover:bg-white/10 transition-all">
                                        <div>
                                            <p className="text-2xl font-black">#{p.fullId}</p>
                                            <p className="text-xs opacity-50 uppercase font-bold">{p['รายละเอียดงาน'] || 'Active Work'}</p>
                                        </div>
                                        <button className="bg-blue-600 px-8 py-3 rounded-2xl font-black text-xs uppercase shadow-lg active:scale-90 transition-all">Verify</button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
